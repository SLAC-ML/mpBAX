# mpBAX Configuration Template

# Random seed for reproducibility
seed: 42

# Maximum number of optimization loops
max_loops: 10

# Number of initial samples to generate
n_initial: 20

# Checkpoint settings
checkpoint:
  # Directory to save checkpoints
  dir: "checkpoints"

  # Frequency of checkpointing (1 = every loop, 2 = every 2 loops, etc.)
  freq: 1

  # Resume from checkpoint (null = start fresh, "latest" = resume from latest, or specify loop number like 5)
  resume_from: null

# Oracle configuration (for fn_generate defaults and validation)
oracles:
  - name: "oracle_1"
    # Input dimension for this oracle's simulation
    input_dim: 2

  # Add more oracles for multi-oracle optimization
  # - name: "oracle_2"
  #   input_dim: 3

# Algorithm configuration (auto-instantiation)
algorithm:
  # Algorithm class name: "RandomSampling", "GreedySampling", or custom "module.ClassName"
  class: "GreedySampling"

  # Parameters for algorithm constructor
  params:
    # Must match oracle dimensions
    input_dims: [2]

    # Number of candidates to propose per oracle per loop
    n_propose: 10

    # Additional params specific to algorithm (e.g., n_candidates for GreedySampling)
    n_candidates: 1000
