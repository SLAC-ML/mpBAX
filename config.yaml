# mpBAX v2.0 Configuration Template
#
# This config demonstrates the config-first API where everything
# (oracle functions, models, generators, algorithm) is specified in config.
#
# Usage:
#   from mpbax.core.engine import Engine
#   engine = Engine(config='config.yaml')  # or pass dict directly
#   engine.run()

# Random seed for reproducibility
seed: 42

# Maximum number of optimization loops
max_loops: 10

# Checkpoint settings
checkpoint:
  # Directory to save checkpoints
  dir: "checkpoints"

  # Frequency of model checkpointing (1 = every loop, 2 = every 2 loops, etc.)
  # Note: Data is always saved every loop regardless of this setting.
  freq: 1

  # Resume from checkpoint (null = start fresh, "latest" = resume from latest, or specify loop number)
  resume_from: null

# Training settings (global, applies to all oracles unless overridden)
# Note: 'training' is the preferred key; 'model' is also supported for backward compatibility
training:
  # Training mode: "retrain" or "finetune"
  # - retrain: Creates fresh model each loop, trains on all accumulated data
  # - finetune: Reuses model from previous loop, continues training
  #   (preserves normalization params, network weights, etc.)
  mode: "retrain"

  # Checkpoint mode: which model(s) to save
  # - "final": Save model after training completes (used for resumption)
  # - "best": Save best model if tracked via get_best_model_snapshot()
  # - "both": Save both final and best models
  checkpoint_mode: "final"

# Oracle configurations (list - one per oracle)
oracles:
  - name: "my_objective"
    input_dim: 4
    n_initial: 20  # Number of initial samples for this oracle

    # Oracle function configuration
    # When using YAML, specify import path as string:
    function:
      class: 'myproject.oracles.my_oracle_function'
      params: {}  # Optional parameters for factory functions

    # Optional: Custom generator function
    # null = default uniform [0,1]^d generator
    generate: null
    # OR specify custom generator:
    # generate:
    #   class: 'myproject.generators.lhs_generator'
    #   params:
    #     criterion: 'maximin'

    # Model configuration
    model:
      class: 'DummyModel'  # Built-in: 'DummyModel' or 'DANetModel'
      params: {}           # Or: 'myproject.models.MyModel'

  # Example: Second oracle for multi-objective optimization
  # - name: "my_constraint"
  #   input_dim: 4
  #   n_initial: 20
  #
  #   function:
  #     class: 'myproject.oracles.my_constraint_function'
  #     params: {}
  #
  #   generate: null
  #
  #   model:
  #     class: 'DummyModel'
  #     params: {}

# Algorithm configuration
algorithm:
  # Built-in: 'RandomSampling', 'GreedySampling'
  # Or custom: 'myproject.algorithms.MyAlgorithm'
  class: 'GreedySampling'

  # Parameters for algorithm constructor
  params:
    # Must match oracle input dimensions
    input_dims: [4]  # [4, 4] for multi-oracle example above

    # Number of candidates to propose per oracle per loop
    n_propose: 10

    # Algorithm-specific params (GreedySampling needs n_candidates)
    n_candidates: 1000


